<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 非官方排行榜</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <script src="./youtube.js" defer></script>
    
    <style>
        .font-cyber {
            font-family: 'Orbitron', 'Share Tech Mono', monospace;
        }
        .cyber-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(239, 68, 68, 0.2);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: flex;
            width: max-content;
            animation: marquee 25s linear infinite;
        }
        .animate-marquee:hover {
            animation-play-state: paused;
        }
        /* 高亮按鈕與模式樣式 */
        .cat-active {
            border-color: #ef4444 !important;
            color: #ef4444 !important;
        }
        .tab-active {
            border-bottom: 2px solid #ef4444;
            color: #ffffff;
        }
    </style>
</head>
<body class="bg-gray-950 text-slate-100 font-sans min-h-screen selection:bg-red-500 selection:text-white">

    <div class="fixed left-4 top-4 z-[200] flex flex-col items-start gap-2">
        <div id="dev-trigger" class="cyber-card p-0.5 rounded-full bg-gradient-to-r from-red-500 to-amber-500 shadow-[0_0_15px_rgba(239,68,68,0.3)] cursor-pointer active:scale-95 transition-all">
            <div class="bg-gray-900 px-3 py-1.5 rounded-full flex items-center gap-3">
                <div class="w-9 h-9 rounded-full overflow-hidden border-2 border-red-500/50 shrink-0 bg-gray-800 flex items-center justify-center">
                    <img id="dev-avatar" 
                         src="./c34f86ec173ba17ab7b8ea476d3d7803.jpg" 
                         onerror="this.src='https://ui-avatars.com/api/?name=Cooper&background=ef4444&color=fff'" 
                         alt="Dev Avatar" 
                         class="w-full h-full object-cover shadow-inner">
                </div>
                <div class="flex flex-col pr-2">
                    <span class="text-[7px] text-red-500 font-cyber font-black opacity-80 uppercase leading-none tracking-tighter">System Architect</span>
                    <span class="text-[10px] text-white font-black tracking-tighter italic whitespace-nowrap">☆彡[ 𝐂𝟎𝟎𝐅𝐥_𝐄 ]彡☆</span>
                </div>
            </div>
        </div>

        <div id="devInfo" class="hidden absolute top-14 left-0 cyber-card p-5 rounded-2xl w-64 backdrop-blur-2xl border border-red-500/30 shadow-[0_0_30px_rgba(0,0,0,0.8)] z-[210]">
            <h3 class="font-cyber font-black text-red-500 text-[10px] mb-3 tracking-[0.2em] uppercase">// Architect Profile</h3>
            <div class="space-y-2 text-[10px]">
                <div class="flex items-center gap-2 text-white">
                    <span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>
                    <span class="text-slate-500">ID:</span> <span class="text-white font-cyber">☆彡[ 𝐂𝟎𝟎𝐅𝐥_𝐄 ]彡☆</span>
                </div>
                <div class="flex items-center gap-2 text-white">
                    <span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>
                    <span class="text-slate-500">Status:</span> <span class="text-white">System Admin</span>
                </div>
                <div class="flex items-center gap-2 text-white">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                    <span class="text-slate-500">Host:</span> <span class="text-green-400 font-cyber">Core Active</span>
                </div>
            </div>
        </div>
    </div>

    <div class="w-full bg-black/80 border-b border-red-500/30 overflow-hidden py-2.5 shadow-lg relative z-10">
        <div id="marquee-inner" class="animate-marquee whitespace-nowrap text-xs font-cyber font-black tracking-widest text-red-500/90">
            </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 py-12 relative z-0">
        
        <div class="flex flex-col items-center justify-center mb-12 text-center">
            <h1 class="text-2xl font-black tracking-tighter uppercase font-cyber bg-gradient-to-r from-white to-red-500 bg-clip-text text-transparent mb-2">
                YOUTUBE RANKLIST
            </h1>
            <p class="text-xs text-slate-500 font-cyber tracking-widest">// UNOFFICIAL REAL-TIME MONITOR</p>
        </div>

        <div class="flex flex-wrap items-center justify-between gap-4 mb-8 bg-gray-900/40 p-4 rounded-xl border border-white/5">
            
            <div class="flex h-9 items-center bg-gray-950 px-2 rounded-lg border border-white/5 font-cyber">
                <button id="tab-trending" onclick="toggleVSMode(false)" class="px-6 h-full flex items-center rounded-md font-black text-[10px] transition-all tab-active uppercase cursor-pointer">HOT TRENDING</button>
                <button id="tab-vs" onclick="toggleVSMode(true)" class="px-6 h-full flex items-center rounded-md font-black text-[10px] transition-all text-slate-400 border-b-2 border-transparent uppercase cursor-pointer">VS ARENA</button>
            </div>

            <div class="flex flex-wrap gap-2 text-xs font-bold">
                <button onclick="changeCategory(0)" class="cat-btn border border-red-500 text-red-500 px-4 py-1.5 rounded cat-active cursor-pointer">ALL</button>
                <button onclick="changeCategory(10)" class="cat-btn border border-white/10 text-slate-500 px-4 py-1.5 rounded hover:border-red-500 transition cursor-pointer">MUSIC</button>
                <button onclick="changeCategory(20)" class="cat-btn border border-white/10 text-slate-500 px-4 py-1.5 rounded hover:border-red-500 transition cursor-pointer">GAMING</button>
                <button onclick="changeCategory(24)" class="cat-btn border border-white/10 text-slate-500 px-4 py-1.5 rounded hover:border-red-500 transition cursor-pointer">ENT</button>
            </div>

            <div class="flex items-center gap-3">
                <select id="regionSelect" onchange="changeRegion()" class="bg-gray-800 px-3 py-1.5 rounded-lg border border-white/5 text-xs font-black font-cyber text-slate-300 outline-none cursor-pointer">
                    <option value="TW">TW</option>
                    <option value="US">US</option>
                    <option value="JP">JP</option>
                </select>
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="搜尋影片或頻道..." class="bg-gray-950 border border-white/10 rounded-lg px-4 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-red-500 w-48 transition-all">
            </div>
        </div>

        <div id="content-area" class="grid grid-cols-1 gap-6">
            <div class="cyber-card p-6 rounded-2xl border border-white/5 animate-pulse flex items-center justify-center min-h-[150px]">
                <span class="text-xs font-cyber text-slate-600 tracking-widest">LOADING DATABASE...</span>
            </div>
        </div>

        <div id="vs-section" class="hidden grid grid-cols-1 md:grid-cols-2 gap-8 items-center justify-center py-6">
            <div id="vs-left" class="transition-all duration-300"></div>
            <div id="vs-right" class="transition-all duration-300"></div>
        </div>

    </main>
</body>
</html>
