<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 非官方排行榜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        /* 簡單的跑馬燈與漸層背景樣式 */
        .marquee {
            white-space: nowrap;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body class="bg-gray-950 text-slate-100 font-sans min-h-screen selection:bg-red-500 selection:text-white">

    <div class="fixed left-4 top-4 z-[200] flex flex-col items-start gap-2">
        <div class="bg-black/80 border border-red-500/50 text-xs px-3 py-1 rounded-md text-red-400 font-mono">
            SYSTEM ARCHITECT // STATUS: ONLINE // DATABASE: SYNCED
        </div>
    </div>

    <div class="w-full bg-black/80 border-b border-red-500/30 overflow-hidden py-2.5 shadow-lg relative z-10">
        <div class="max-w-6xl mx-auto px-4 flex items-center justify-between">
            <h1 class="text-xl font-bold tracking-wider text-red-500 flex items-center gap-2">
                🔴 YOUTUBE RANKLIST
            </h1>
            <span class="text-xs text-slate-500 font-mono">// UNOFFICIAL REAL-TIME MONITOR</span>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 py-12 relative z-0">
        <div class="flex flex-wrap items-center justify-between gap-4 mb-8 bg-gray-900/40 p-4 rounded-xl border border-white/5">
            <div class="flex items-center gap-2" id="filter-buttons">
                <button data-category="ALL" class="category-btn px-4 py-1.5 rounded-lg text-xs font-semibold bg-red-600 text-white transition">ALL</button>
                <button data-category="MUSIC" class="category-btn px-4 py-1.5 rounded-lg text-xs font-semibold bg-gray-800 text-slate-400 hover:bg-gray-700 transition">MUSIC</button>
                <button data-category="GAMING" class="category-btn px-4 py-1.5 rounded-lg text-xs font-semibold bg-gray-800 text-slate-400 hover:bg-gray-700 transition">GAMING</button>
                <button data-category="ENT" class="category-btn px-4 py-1.5 rounded-lg text-xs font-semibold bg-gray-800 text-slate-400 hover:bg-gray-700 transition">ENT</button>
            </div>
            
            <div class="flex items-center gap-4">
                <input type="text" id="search-input" placeholder="搜尋頻道..." class="bg-gray-950 border border-white/10 rounded-lg px-4 py-1.5 text-xs focus:outline-none focus:border-red-500/50 w-48 transition">
                <div class="flex items-center bg-gray-950 p-1 rounded-lg border border-white/10 text-xs">
                    <button class="px-3 py-1 bg-red-600 text-white rounded-md font-semibold">HOT</button>
                    <button class="px-3 py-1 text-slate-400 hover:text-white transition">VS ARENA</button>
                </div>
            </div>
        </div>

        <div id="ranklist-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-24 text-slate-500 font-mono tracking-widest text-sm animate-pulse" id="loading-placeholder">
                LOADING DATABASE...
            </div>
        </div>
    </main>

    <script>
        // ⚠️ 請在下方貼上妳從 Google Cloud Console 申請到的真實 API 金鑰 ⚠️
        const API_KEY = '請在這裡填入妳的YouTube_API_Key';

        // 模擬的排行榜初始資料（當 API 載入失敗或尚未填寫時作為備用，確保按鈕絕對可以按）
        const mockData = [
            { id: '1', title: 'Loading Channel...', category: 'MUSIC', videoId: 'dQw4w9WgXcQ', views: '999,999' },
            { id: '2', title: 'Loading Channel...', category: 'GAMING', videoId: 'dQw4w9WgXcQ', views: '888,888' },
            { id: '3', title: 'Loading Channel...', category: 'ENT', videoId: 'dQw4w9WgXcQ', views: '777,777' }
        ];

        let currentCategory = 'ALL';
        let searchQuery = '';

        // 當網頁 HTML 結構完全載入後執行
        document.addEventListener("DOMContentLoaded", function() {
            console.log("DOM 載入完成，初始化按鈕事件...");
            initButtons();
            renderRanklist(mockData); // 先用預設資料渲染，避免畫面卡死在 LOADING
            
            // 如果妳有寫真正的抓取 API 函數，可以在這裡呼叫它：
            // fetchYouTubeData(); 
        });

        // 初始化按鈕點擊事件與搜尋框事件
        function initButtons() {
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    // 切換按鈕的高亮樣式
                    buttons.forEach(b => {
                        b.classList.remove('bg-red-600', 'text-white');
                        b.classList.add('bg-gray-800', 'text-slate-400');
                    });
                    this.classList.remove('bg-gray-800', 'text-slate-400');
                    this.classList.add('bg-red-600', 'text-white');

                    // 篩選分類
                    currentCategory = this.getAttribute('data-category');
                    filterAndRender();
                });
            });

            // 搜尋框輸入監聽
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('input', function(e) {
                    searchQuery = e.target.value.toLowerCase();
                    filterAndRender();
                });
            }
        }

        // 根據目前的分類與搜尋關鍵字過濾並渲染畫面
        function filterAndRender() {
            const filtered = mockData.filter(item => {
                const matchesCategory = (currentCategory === 'ALL' || item.category === currentCategory);
                const matchesSearch = item.title.toLowerCase().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });
            renderRanklist(filtered);
        }

        // 將資料渲染到網頁上的主要函數
        function renderRanklist(data) {
            const container = document.getElementById('ranklist-container');
            const placeholder = document.getElementById('loading-placeholder');
            
            if (placeholder) placeholder.remove(); // 移除 LOADING 字樣
            if (!container) return;

            if (data.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500 font-mono">查無相關頻道資料</div>`;
                return;
            }

            container.innerHTML = data.map((item, index) => `
                <div class="bg-gray-900/20 border border-white/5 rounded-2xl overflow-hidden hover:border-red-500/30 transition-all duration-300 group shadow-xl">
                    <div class="p-5 flex flex-col gap-4">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-mono text-red-500 bg-red-500/10 px-2 py-0.5 rounded border border-red-500/20">RANK #0${index + 1}</span>
                            <span class="text-[10px] font-mono text-slate-500 tracking-wider">${item.category}</span>
                        </div>
                        
                        <div class="aspect-video w-full rounded-xl overflow-hidden bg-black border border-white/5 relative">
                            <iframe class="w-full h-full" src="https://www.youtube.com/embed/${item.videoId}" frameborder="0" allowfullscreen></iframe>
                        </div>

                        <div class="flex items-center justify-between mt-2">
                            <h3 class="font-bold text-sm text-slate-200 group-hover:text-red-400 transition truncate w-40">${item.title}</h3>
                            <div class="text-right">
                                <p class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">VIEWS</p>
                                <p class="font-mono text-xs font-bold text-slate-300">${item.views}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
